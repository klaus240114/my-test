<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>核心特质性格快速测试</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; color: #333; padding: 15px; text-align: center; }
        .card { background: white; padding: 25px 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: 40px auto; }
        .progress { color: #6c5ce7; font-weight: bold; margin-bottom: 20px; font-size: 14px; }
        .question-text { font-size: 18px; line-height: 1.6; margin-bottom: 25px; min-height: 60px; text-align: left; font-weight: 500; color: #1e1e24; }
        .btn-option { background: #f0edf9; color: #4a3f9e; border: 1px solid #dcd6f7; padding: 14px; border-radius: 8px; cursor: pointer; font-size: 15px; margin: 8px 0; width: 100%; transition: 0.2s; text-align: left; padding-left: 20px; }
        .btn-option:hover { background: #6c5ce7; color: white; border-color: #6c5ce7; }
        button.start-btn { background: #6c5ce7; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button.start-btn:hover { background: #5b4cc4; }
        .hidden { display: none; }
        .info-box { background: #f3f0ff; border-left: 4px solid #6c5ce7; padding: 15px; border-radius: 4px; text-align: left; margin: 15px 0; line-height: 1.6; font-size: 15px; }
        .cta-box { margin-top: 25px; background: #fff9db; padding: 15px; border-radius: 8px; font-size: 14px; color: #856404; border: 1px solid #ffeeba; text-align: left; }
        .next-btn { background: #ff4757; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 15px; width: 100%; font-weight: bold; margin-top: 10px; }
        .next-btn:hover { background: #e04050; }
    </style>
</head>
<body>

<div class="card">
    <!-- 欢迎界面 -->
    <div id="start-page">
        <h2>🧬 核心特质性格快速精简测试</h2>
        <p style="color:#666; line-height:1.6; text-align: left; font-size: 14px;">只需 5 题，快速解密你潜意识中的核心性格底色。请根据第一直觉进行选择。</p>
        <button class="start-btn" onclick="startTest()">开始快速测评</button>
    </div>

    <!-- 测验进行界面 -->
    <div id="quiz-page" class="hidden">
        <div class="progress">📑 测试进行中：第 <span id="current-idx">1</span> / 5 题</div>
        <div class="question-text" id="q-text">加载中...</div>
        <button class="btn-option" onclick="handleAnswer(5)">5 - 非常同意</button>
        <button class="btn-option" onclick="handleAnswer(4)">4 - 同意</button>
        <button class="btn-option" onclick="handleAnswer(3)">3 - 没意见</button>
        <button class="btn-option" onclick="handleAnswer(2)">2 - 不同意</button>
        <button class="btn-option" onclick="handleAnswer(1)">1 - 非常不同意</button>
    </div>

    <!-- 结果导向界面 -->
    <div id="result-page" class="hidden">
        <h2 style="color: #2f3542;">🎉 快速性格检测完成！</h2>
        <p style="color: #6c5ce7; font-weight: bold;">初步诊断你的潜意识核心标签为：</p>
        
        <div class="info-box">
            <b style="font-size: 17px; color: #4a3f9e;" id="result-title"></b>
            <p id="result-desc" style="margin-top: 8px; margin-bottom: 0; color: #444;"></p>
        </div>

        <div class="cta-box">
            <b>🔥 精简版意犹未尽？解锁完整90题深度大五人格报告！</b><br style="margin-bottom: 5px;">
            点击下方按钮，立即前往【90题深度精准测评版】，全面解锁核心优势、潜在盲点以及2026搞钱方向！
            <button class="next-btn" onclick="goToDeepTest()">🎯 猛戳这里！挑战90题深度测验</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        {"text": "1. 在社交聚会中，我通常能轻松主动地与陌生人攀谈。", "type": "A"}, // 外向
        {"text": "2. 遇到突发紧急事件时，我能保持冷静并理清头绪，而不是慌乱。", "type": "B"}, // 沉稳
        {"text": "3. 我是一个凡事都会提前做好规划，并严格按时完成的人。", "type": "C"}, // 严谨
        {"text": "4. 我常常有一些天马行空、与众不同的新奇创意和点子。", "type": "D"}, // 创新
        {"text": "5. 我非常容易设身处地地为他人着想，甚至有时为了和谐而妥协。", "type": "E"} // 亲和
    ];

    let currentQ = 0;
    let maxScore = -1;
    let topType = "A";

    function startTest() {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        document.getElementById('current-idx').innerText = currentQ + 1;
        document.getElementById('q-text').innerText = questions[currentQ].text;
        window.scrollTo(0, 0);
    }

    function handleAnswer(score) {
        if (score > maxScore) {
            maxScore = score;
            topType = questions[currentQ].type;
        }

        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        window.scrollTo(0, 0);

        let resTitle = "";
        let resDesc = "";

        switch(topType) {
            case "A":
                resTitle = "✨ 耀眼发光体 (High Energy Connector)";
                resDesc = "你天生自带磁场，在人群中极具存在感。你擅长通过人际互动获取能量，沟通与表现力是你的天然护城河。";
                break;
            case "B":
                resTitle = "🏔️ 定海神针 (The Calm Anchor)";
                resDesc = "你拥有极强的核心稳定度，情绪内核强大。在外界风吹草动或面临压力时，你往往是团队中最让人安心的定盘星。";
                break;
            case "C":
                resTitle = "🎯 满分导航仪 (The Precision Planner)";
                resDesc = "你做事自律且极具条理，讨厌失控感。高度的执行力与对细节的敏锐度，让你承诺过的事极少出错。";
                break;
            case "D":
                resTitle = "🔮 灵魂冲浪者 (The Visionary Creative)";
                resDesc = "你拥有丰富的精神世界与极高的包容度，抗拒枯燥与教条。天马行空的创新思维常能帮你开辟独特的路径。";
                break;
            case "E":
                resTitle = "🩹 高能疗愈大师 (The Empathetic Healer)";
                resDesc = "你拥有极高的情商与同理心雷达，能精准捕捉旁人的情绪需求。温暖、利atis是你人际关系中最迷人的标签。";
                break;
        }

        document.getElementById('result-title').innerText = resTitle;
        document.getElementById('result-desc').innerText = resDesc;
    }

    function goToDeepTest() {
        window.location.href = "test90.html";
    }
</script>
</body>
</html>
