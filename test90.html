            desc = "你是一个情感极其细腻、警觉性很高的观察者。你对环境的微小变化和潜在风险有着天生的雷达，这让你能够在危机发生前就做好最坏的打算与防范。";

            weaknesses = ["容易过度焦虑、内耗，常为还没发生的事情失眠", "自信心较不足，遇到挫折容易陷入自我怀疑", "在压力环境下决策容易变得犹豫不决", "需要较长的独处时间来修复受伤的情绪"];
        } 
        else {
            title = "⚖️ 务实平衡者 (The Pragmatic Realist)";
            desc = "你是一个非常均衡、务实的人。你不会极端地偏向某个特质，而是能根据当下的现实情况灵活调整自己。你既能参与社交，也能享受独处；既仰望星空，也脚踏实地。";
            strengths = ["情绪状态相对稳定，处事客观冷静", "没有明显的性格短板，能够胜任多种角色", "既讲求效率，也能兼顾人际关系的平衡", "务实理性，不轻易被天马行空的幻想误导"];
            weaknesses = ["有时在团队中显得特色不够鲜明", "在需要极致创新或极端激进的环境中可能显得保守", "倾向于打安全牌，可能会因此错失一些高风险高回报的机会", "容易流于安稳的舒适圈而不愿轻易打破现状"];
        }

        document.getElementById('personality-title').innerText = title;
        document.getElementById('description-text').innerText = desc;

        let sHtml = "";
        strengths.forEach(s => sHtml += `<p>✅ ${s}</p>`);
        document.getElementById('strengths-text').innerHTML = sHtml;

        let wHtml = "";
        weaknesses.forEach(w => wHtml += `<p>❌ ${w}</p>`);
        document.getElementById('weaknesses-text').innerHTML = wHtml;
    }
</script>
</body>
</html>
