        let finalScore = (q.sign === -1) ? (6 - rawScore) : rawScore;
        scores[q.dim] += finalScore;

        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            calculateAndShowResult();
        }
    }

            title = "🔮 靈魂思想家 (The Idealistic Thinker)";
            desc = "你擁有深邃的內心世界與豐富的想像力。比起喧囂的社交場合，你更喜歡安靜地探索藝術、哲學或內心精神世界。你對人性的敏銳洞察讓你往往充滿智慧。";
            strengths = ["具有深度思考能力與獨特的審美與創造力", "高度精神自省，不容易盲從社會主流價值觀", "對朋友極其忠誠，心思細膩體貼", "擅長文字創作、策略規劃或深度諮詢"];
            weaknesses = ["容易陷入想得多、做得少的「思想巨人，行動矮子」困境", "過度敏感，容易被周遭的負面能量或衝突所灼傷", "有時顯得過於孤僻或不食人間煙火", "面對嚴酷、現實的激烈競爭時容易退縮"];
        } 
        else if (high_n && !high_e) {
            title = "🔍 敏銳觀察家 (The Sensitive Analyst)";
            desc = "你是一個情感極其細膩、警覺性很高的觀察者。你對環境的微小變化和潛在風險有著天生的雷達，這讓你能夠在危機發生前就做好最壞的打算與防範。";
            strengths = ["危機意識極高，能提早發現計畫中的漏洞", "情感細膩，對文藝、心理學有極高的天賦", "做事謹慎，很少因為衝動而犯下大錯", "注重細節，交出來的成果通常非常嚴謹"];
            weaknesses = ["容易過度焦慮、內耗，常為還沒發生的事情失眠", "自信心較不足，遇到挫折容易陷入自我懷疑", "在壓力環境下決策容易變得猶豫不決", "需要較長的獨處時間來修復受傷的情緒"];
        } 
        else {
            title = "⚖️ 務實平衡者 (The Pragmatic Realist)";
            desc = "你是一個非常均衡、務實的人。你不會極端地偏向某個特質，而是能根據當下的現實情況靈活調整自己。你既能參與社交，也能享受獨處；既仰望星空，也腳踏實地。";
            strengths = ["情緒狀態相對穩定，處事客觀冷靜", "沒有明顯的性格短板，能夠勝任多種角色", "既講求效率，也能兼顧人際關係的平衡", "務實理性，不輕易被天馬行空的幻想誤導"];
            weaknesses = ["有時在團隊中顯得特色不夠鮮明", "在需要極致創新或極端激進的環境中可能顯得保守", "傾向於打安全牌，可能會因此錯失一些高風險高回報的機會", "容易流於安穩的舒適圈而不願輕易打破現狀"];
        }

        // 把結果塞進網頁
        document.getElementById('personality-title').innerText = title;
        document.getElementById('description-text').innerText = desc;

        let sHtml = "";
        strengths.forEach(s => sHtml += `<p>✅ ${s}</p>`);
        document.getElementById('strengths-text').innerHTML = sHtml;

        let wHtml = "";
        weaknesses.forEach(w => wHtml += `<p>❌ ${w}</p>`);
        document.getElementById('weaknesses-text').innerHTML = wHtml;
    }
</script>
</body>
</html>
